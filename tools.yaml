# 1. Define the connection source
kind: sources
name: mssql-master-db
type: mssql
host: 172.0.0.1
port: 1433
database: master
user: sa
password: Passw0rd
---

# 2. Define a tool to list tables (Example Tool)
kind: tools
name: list-tables
type: mssql-sql
source: mssql-master-db
description: List all user tables in the master database.
statement: |
  SELECT TABLE_NAME 
  FROM INFORMATION_SCHEMA.TABLES 
  WHERE TABLE_TYPE = 'BASE TABLE';

---

# 3. Define a tool to get columns and types for a specific table
kind: tools
name: get-table-schema
type: mssql-sql
source: mssql-master-db
description: Get column details, including whether a column is an identity (auto-increment) column.
parameters:
  - name: table_name
    type: string
    description: The name of the table to describe.
statement: |
  SELECT 
      c.TABLE_NAME, 
      c.COLUMN_NAME, 
      c.DATA_TYPE, 
      c.IS_NULLABLE,
      COLUMNPROPERTY(OBJECT_ID(c.TABLE_SCHEMA + '.' + c.TABLE_NAME), c.COLUMN_NAME, 'IsIdentity') AS IS_IDENTITY
  FROM INFORMATION_SCHEMA.COLUMNS c
  WHERE c.TABLE_NAME = @table_name;


---

kind: tools
name: execute-query
type: mssql-sql
source: mssql-master-db
description: Execute an INSERT, UPDATE, or DELETE statement.
parameters:
  - name: sql_query
    type: string
    description: The full SQL statement to execute.
statement: |
  {{sql_query}}
---

kind: toolsets
name: admin
tools:
  - list-tables
  - get-table-schema
  - execute-query